name: Refresh Instagram Token

on:
  schedule:
    - cron: '0 22 1 * *'  # 毎月1日 07:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行（テスト・緊急更新用）

jobs:
  refresh-token:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2  # Node.js 24対応は v5+ が必要（2026-09-16 までに移行予定）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests PyNaCl

      - name: Refresh Instagram token and update secret
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: python refresh_token.py
