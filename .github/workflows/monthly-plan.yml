name: Monthly Story Plan

on:
  schedule:
    - cron: '0 22 24 * *'  # 毎月25日 07:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行（テスト用）

jobs:
  create-plan-issue:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests jpholiday

      - name: Create monthly plan issue
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: python create_monthly_plan.py
