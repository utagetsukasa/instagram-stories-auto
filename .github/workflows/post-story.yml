name: Post Instagram Story

on:
  schedule:
    - cron: '0 22 * * *'  # 毎日 07:00 JST（UTC+9）
  workflow_dispatch:  # 手動実行（テスト用）

jobs:
  post-story:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4.2.2  # Node.js 24対応は v5+ が必要（2026-09-16 までに移行予定）

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests jpholiday

      - name: Check required secrets
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: |
          if [ -z "$INSTAGRAM_ACCESS_TOKEN" ]; then
            echo "::error::シークレット INSTAGRAM_ACCESS_TOKEN が未設定です。Settings > Secrets and variables > Actions で登録してください。"
            exit 1
          fi
          if [ -z "$INSTAGRAM_USER_ID" ]; then
            echo "::error::シークレット INSTAGRAM_USER_ID が未設定です。Settings > Secrets and variables > Actions で登録してください。"
            exit 1
          fi
          echo "シークレット確認 OK"

      - name: Post Instagram Story
        env:
          INSTAGRAM_ACCESS_TOKEN: ${{ secrets.INSTAGRAM_ACCESS_TOKEN }}
          INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
        run: python post_story.py
