  name: Post Instagram Story                                        
                                                                    
  on:                                                               
    schedule:                                                       
      - cron: '0 23 * * *'  # 毎日 午前8時（日本時間）              
    workflow_dispatch:  # 手動実行ボタン（テスト用）
                                                                    
  jobs:                                                     
    post-story:
      runs-on: ubuntu-latest                                        
      steps:
        - uses: actions/checkout@v4                                 
                                                            
        - name: Set up Python             
          uses: actions/setup-python@v5
          with:                                                     
            python-version: '3.11'
                                                                    
        - name: Install dependencies                        
          run: pip install requests jpholiday

        - name: Post Instagram Story
          env:
            INSTAGRAM_ACCESS_TOKEN: ${{       
  secrets.INSTAGRAM_ACCESS_TOKEN }}       
            INSTAGRAM_USER_ID: ${{ secrets.INSTAGRAM_USER_ID }}
          run: python post_story.py    
